name: Run Supervisor Discovery

# This allows you to manually trigger the script from the GitHub website or Mobile App
on:
  workflow_dispatch: 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Data (Rename Master List)
        run: cp "universities master list.json" universities.json

      - name: Run Discovery Script
        run: python discover.py .
        
      - name: Run Evaluation
        run: python evaluate.py .

      - name: Generate Final Reports
        run: python generate_outputs.py .

      - name: Upload Output Files
        uses: actions/upload-artifact@v4
        with:
          name: Discovery-Results
          path: outputs/
